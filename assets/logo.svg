<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="coin" x1="176" y1="176" x2="336" y2="336" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- macOS-style rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bg)"/>

  <!-- scope reticle ring -->
  <circle cx="256" cy="256" r="150" stroke="white" stroke-width="22" opacity="0.95"/>

  <!-- reticle tick marks (N E S W) -->
  <line x1="256" y1="66"  x2="256" y2="122" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <line x1="256" y1="390" x2="256" y2="446" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <line x1="66"  y1="256" x2="122" y2="256" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <line x1="390" y1="256" x2="446" y2="256" stroke="white" stroke-width="22" stroke-linecap="round"/>

  <!-- token (coin) in the crosshairs -->
  <circle cx="256" cy="256" r="86" fill="url(#coin)"/>
  <circle cx="256" cy="256" r="86" stroke="#B45309" stroke-width="6" opacity="0.35"/>
  <circle cx="256" cy="256" r="62" stroke="#B45309" stroke-width="8" opacity="0.3"/>

  <!-- "T" for Token stamped on the coin -->
  <path d="M216 226 h80 M256 226 v86" stroke="#92400E" stroke-width="24" stroke-linecap="round"/>
</svg>
